name: Auto Blog

on:
  schedule:
    - cron: "0 3,9,15 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install lxml_html_clean

      - name: Run script
        run: python main.py
