name: Auto Blog

on:
  schedule:
    - cron: "0 3,9,15 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run script
        run: python main.py
